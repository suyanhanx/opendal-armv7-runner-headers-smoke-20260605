name: Armv7 Runner Headers Smoke

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armv7l
            manylinux: auto
          - target: armv7-unknown-linux-musleabihf
            manylinux: musllinux_1_1
    steps:
      - uses: actions/checkout@v6
      - name: Assert no local io_uring header override
        run: |
          test ! -e bindings/python/.cargo/config.toml
          test ! -e bindings/python/uapi/io_uring_bindgen.h
          test ! -e bindings/python/uapi/linux/io_uring.h
      - name: Setup Rust toolchain
        uses: ./.github/actions/setup
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          command: build
          args: --release -o dist -i python3.11 --features=pyo3/extension-module,services-all,abi3
          manylinux: ${{ matrix.manylinux }}
      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: bindings/python/dist/*.whl
